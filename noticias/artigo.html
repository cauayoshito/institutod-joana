<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícia · Instituto Social D'Joana</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="artigo.css" />
</head>
<body class="artigo-page">

  <!-- Topbar -->
  <header class="artigo-topbar">
    <div class="artigo-topbar-inner">
      <a href="../index.html" class="artigo-back-logo">
        <img src="../assets/logos/d'joana.png" alt="Instituto Social D'Joana" />
      </a>
      <a href="../index.html#noticias" class="artigo-back-link">
        ← Voltar ao site
      </a>
    </div>
  </header>

  <main class="artigo-main" id="artigo-main">

    <!-- Loading state -->
    <div id="artigo-loading" class="artigo-loading">
      <div class="artigo-spinner"></div>
      <p>Carregando…</p>
    </div>

    <!-- Error state -->
    <div id="artigo-error" class="artigo-error" style="display:none">
      <p>Não foi possível carregar esta notícia.</p>
      <a href="../index.html#noticias" class="btn btn-outline">← Voltar às notícias</a>
    </div>

    <!-- Article content (filled by JS) -->
    <article id="artigo-content" class="artigo-content" style="display:none">

      <div class="artigo-cover-wrap" id="artigo-cover-wrap" style="display:none">
        <img id="artigo-cover" src="" alt="" class="artigo-cover" />
      </div>

      <div class="artigo-body">
        <a href="../index.html#noticias" class="artigo-breadcrumb">← Todas as notícias</a>

        <span class="news-tag" id="artigo-tag"></span>
        <h1 id="artigo-title"></h1>

        <div class="artigo-text" id="artigo-text"></div>

        <!-- Documents block -->
        <div class="artigo-docs" id="artigo-docs" style="display:none">
          <p class="artigo-docs-title">Documentos da parceria</p>
          <div id="artigo-docs-list" class="artigo-docs-list"></div>
        </div>

        <!-- Instagram link -->
        <div class="artigo-source" id="artigo-source" style="display:none">
          <a id="artigo-insta-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-dark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
            Ver publicação original
          </a>
        </div>

        <a href="../index.html#noticias" class="artigo-back-bottom">← Voltar às notícias</a>
      </div>
    </article>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="artigo.js"></script>
</body>
</html>
